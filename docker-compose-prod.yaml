version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ssp_tpr_manager_production
    volumes:
      - prod_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  web:
    build: .
    command: ./bin/thrust ./bin/rails server -b 0.0.0.0 -e production
    ports:
      - "3000:80"
    depends_on:
      - db
      - redis
    environment:
      RAILS_ENV: production
      RAILS_SERVE_STATIC_FILES: "true"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db/ssp_tpr_manager_production
      REDIS_URL: redis://redis:6379/0
      ACTIVE_STORAGE_SERVICE: amazon               # or your S3 alias
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: us-east-1
      AWS_BUCKET: your-bucket-name

  sidekiq:
    build: .
    command: bundle exec sidekiq
    depends_on:
      - db
      - redis
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db/ssp_tpr_manager_production
      REDIS_URL: redis://redis:6379/0

volumes:
  prod_postgres: