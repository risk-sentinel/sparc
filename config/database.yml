# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/usr/local/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

  # ── Transport security (#785, NIST SC-8 / SC-8(1), FedRAMP High) ──────────
  # This lives in `default:` deliberately so it is inherited by EVERY database —
  # primary AND the cache/queue/cable secondaries. DATABASE_URL only ever applies
  # to `primary` (activerecord database_configurations.rb: `url ||= ENV["DATABASE_URL"]
  # if name == "primary"`), so without a floor here the three Solid* databases
  # would negotiate on libpq's default and could fall back to plaintext.
  #
  #   prefer      — opportunistic; falls back to plaintext. Dev/test default.
  #   require     — refuses plaintext, but does NOT authenticate the server.
  #   verify-full — refuses plaintext AND verifies the cert chain + hostname.
  #                 Requires sslrootcert. This is the FedRAMP High target.
  #
  # Production floors at `require` so an unset variable can never silently
  # downgrade; set SPARC_DB_SSLMODE=verify-full once the CA bundle is present.
  #
  # Both values are QUOTED so this file still parses as raw YAML: the ternary
  # below contains a `:`, which an unquoted scalar would read as a mapping
  # separator. Editors and YAML tooling parse database.yml without rendering
  # ERB first, so keeping it valid matters.
  sslmode: "<%= ENV.fetch('SPARC_DB_SSLMODE') { ENV['RAILS_ENV'] == 'production' ? 'require' : 'prefer' } %>"

  # Emitted unconditionally rather than wrapped in an ERB `if`, which would put
  # a bare `<% %>` line into the mapping and break YAML parsing. Safe because
  # Rails compacts the config before connecting
  # (postgresql_adapter.rb: `conn_params = @config.compact`), so an empty value
  # is dropped rather than passed to libpq. Only the verify-* modes consult it.
  sslrootcert: <%= ENV['SPARC_DB_SSLROOTCERT'] %>


development:
  <<: *default
  database: ssp_tpr_manager_development

  # The specified database role being used to connect to PostgreSQL.
  # To create additional roles in PostgreSQL see `$ createuser --help`.
  # When left blank, PostgreSQL will use the default role. This is
  # the same name as the operating system user running Rails.
  #username: ssp_tpr_manager

  # The password associated with the PostgreSQL role (username).
  #password:

  # Connect on a TCP socket. Omitted by default since the client uses a
  # domain socket that doesn't need configuration. Windows does not have
  # domain sockets, so uncomment these lines.
  #host: localhost

  # The TCP port the server listens on. Defaults to 5432.
  # If your server runs on a different port number, change accordingly.
  #port: 5432

  # Schema search path. The server defaults to $user,public
  #schema_search_path: myapp,sharedapp,public

  # Minimum log levels, in increasing order:
  #   debug5, debug4, debug3, debug2, debug1,
  #   log, notice, warning, error, fatal, and panic
  # Defaults to warning.
  #min_messages: notice

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: ssp_tpr_manager_test

# As with config/credentials.yml, you never want to store sensitive information,
# like your database password, in your source code. If your source code is
# ever seen by anyone, they now have access to your database.
#
# Instead, provide the password or a full connection URL as an environment
# variable when you boot the app. For example:
#
#   DATABASE_URL="postgres://myuser:mypass@localhost/somedatabase"
#
# If the connection URL is provided in the special DATABASE_URL environment
# variable, Rails will automatically merge its configuration values on top of
# the values provided in this file. Alternatively, you can specify a connection
# URL environment variable explicitly:
#
#   production:
#     url: <%= ENV["MY_APP_DATABASE_URL"] %>
#
# Read https://guides.rubyonrails.org/configuring.html#configuring-a-database
# for a full overview on how database connection configuration can be specified.
#
# #785 Pass 2 — DATABASE_URL is the single source for all four databases.
#
# Rails merges DATABASE_URL into `primary` only, so the cache/queue/cable
# secondaries are derived from it via DbUrl (lib/db_url/config.rb), using Rails'
# own resolver. SPARC_DB_* remains a fully supported fallback for when
# DATABASE_URL is unset — this reduces what must be SET, not what works. The
# derived database name gets the _cache/_queue/_cable suffix as before.
#
# Only inline <%= %> expressions here, no <% %> statement block: this file must
# stay parseable as raw YAML (#788). All logic lives in DbUrl, required from
# config/application.rb so the constant exists when this renders.
#
# DATABASE_URL always wins when present (Rails convention). See
# docs/ENVIRONMENT_VARIABLES.md for the full configuration reference.
production:
  primary: &primary_production
    <<: *default
    database: <%= DbUrl.database %>
    username: <%= DbUrl.username %>
    password: <%= DbUrl.password %>
    host: <%= DbUrl.host %>
    port: <%= DbUrl.port %>
  cache:
    <<: *primary_production
    database: <%= DbUrl.cache_database %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: <%= DbUrl.queue_database %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: <%= DbUrl.cable_database %>
    migrations_paths: db/cable_migrate
