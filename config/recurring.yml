# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  service_account_notifications:
    class: ServiceAccountNotificationJob
    schedule: every day at 2:30am
  service_account_maintenance:
    class: ServiceAccountMaintenanceJob
    schedule: every day at 3am
  # #466 — refresh AWS Labs CDEF catalog. Service is gated on
  # SPARC_AWS_LABS_CDEF_ENABLED so this is a no-op for tenants that haven't
  # opted in. ETag conditional fetch makes the unchanged-tree path near-free.
  # Interval is operator-tunable via SPARC_AWS_LABS_CDEF_REFRESH_INTERVAL_DAYS
  # (default 7). AWS Labs CDEFs change on the order of weeks, so weekly avoids
  # log/audit noise without missing meaningful upstream updates.
  aws_labs_cdef_refresh:
    class: AwsLabsCdefRefreshJob
    schedule: every <%= ENV.fetch("SPARC_AWS_LABS_CDEF_REFRESH_INTERVAL_DAYS", "7").to_i.clamp(1, 90) %> days at 6am
  # #618 — server-side stuck-document reaper. Resolves fileless metadata docs
  # to `completed` and marks genuinely stalled file parses `failed` (see the
  # job for the two conditions). Runs frequently since the unit of staleness
  # (SPARC_DOCUMENT_REAP_MINUTES, default 10) is minutes, not days.
  stuck_document_reaper:
    class: StuckDocumentReaperJob
    schedule: every 5 minutes
  # #690 — artifact storage-hygiene reaper (orphan blobs + dangling back-matter
  # hrefs). Report-only unless SPARC_ARTIFACT_REAPER_PURGE=true. Storage state
  # changes slowly and per-version retention means growth is expected, so this
  # runs on a multi-day cadence (SPARC_ARTIFACT_REAPER_INTERVAL_DAYS, default 7)
  # to avoid log/audit noise.
  artifact_storage_reaper:
    class: ArtifactStorageReaperJob
    schedule: every <%= ENV.fetch("SPARC_ARTIFACT_REAPER_INTERVAL_DAYS", "7").to_i.clamp(1, 90) %> days at 4am
