# examples:
#   periodic_cleanup:
#     class: CleanSoftDeletedRecordsJob
#     queue: background
#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  service_account_notifications:
    class: ServiceAccountNotificationJob
    schedule: every day at 2:30am
  service_account_maintenance:
    class: ServiceAccountMaintenanceJob
    schedule: every day at 3am
  # #466 — refresh AWS Labs CDEF catalog. Service is gated on
  # SPARC_AWS_LABS_CDEF_ENABLED so this is a no-op for tenants that haven't
  # opted in. ETag conditional fetch makes the unchanged-tree path near-free.
  # Interval is operator-tunable via SPARC_AWS_LABS_CDEF_REFRESH_INTERVAL_DAYS
  # (default 7). AWS Labs CDEFs change on the order of weeks, so weekly avoids
  # log/audit noise without missing meaningful upstream updates.
  aws_labs_cdef_refresh:
    class: AwsLabsCdefRefreshJob
    schedule: every <%= ENV.fetch("SPARC_AWS_LABS_CDEF_REFRESH_INTERVAL_DAYS", "7").to_i.clamp(1, 90) %> days at 6am
