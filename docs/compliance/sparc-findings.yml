    next_review_date: "2026-06-05"

  - cve_id: CVE-2026-41316
    package: erb (base-image-bundled stdlib, version 4.0.4)
    installed_version: "4.0.4"
    fixed_version: ">= 6.0.4 (or backport 4.0.4.1)"
    severity: HIGH
    disposition: deferred
    rationale: "DEFERRED. ERB instance variable @_init guard bypass allowing code execution via Marshal.load deserialization of crafted ERB objects. SPARC's Gemfile pins erb 6.0.4 (PR #410, v1.5.0) which is patched. However, the production image's ruby:3.4.4-slim base bundles an OLDER erb 4.0.4 in the Ruby stdlib path (separate from /usr/local/bundle gems). Trivy reports this as the older bundled version. SPARC application code uses the Gemfile-installed erb 6.0.4, not the stdlib bundled version, so the vulnerable Marshal.load path is not actually exposed at runtime. Remediation paths: (a) wait for ruby:3.4.4-slim base image to publish patched stdlib, (b) upgrade base to a newer Ruby, (c) explicitly remove the bundled stdlib erb at build time. **TODO: open follow-up issue to track base-image stdlib remediation.**"
    nist_control: si-2
    reviewed_by: "@clem-field"
    discovery_date: "2026-05-06"
    next_review_date: "2026-06-05"

  - cve_id: CVE-2026-42246
    package: net-imap (base-image-bundled stdlib, version 0.5.8)
    installed_version: "0.5.8"
    fixed_version: ">= 0.6.4"
    severity: HIGH
    disposition: deferred
    rationale: "DEFERRED. Net::IMAP STARTTLS stripping vulnerability allowing a man-in-the-middle attacker to inject a tagged OK response that causes #starttls to return successfully without actually starting TLS. SPARC's Gemfile pins net-imap 0.6.4 (PR #438, v1.5.0) which is patched. Same base-image-bundle issue as CVE-2026-41316: ruby:3.4.4-slim ships an older net-imap 0.5.8 in the stdlib path. SPARC does not use Net::IMAP in any application code (no IMAP client, no email retrieval). Vulnerable surface is not loaded. Remediation paths same as CVE-2026-41316. **TODO: open follow-up issue to track base-image stdlib remediation.**"
    nist_control: si-2
    reviewed_by: "@clem-field"
    discovery_date: "2026-05-06"
    next_review_date: "2026-06-05"

  - cve_id: CVE-2026-32280
    package: thruster (Go binary, stdlib v1.26.1)
    installed_version: "thruster 0.1.20 / Go stdlib v1.26.1"
    fixed_version: ">= Go 1.25.9, >= Go 1.26.2"
    severity: HIGH
    disposition: deferred
    rationale: "DEFERRED. Go crypto/x509 chain-building DoS via certificates with excessive intermediate count. SPARC's thruster gem (v0.1.20, basecamp/thruster -- HTTP/2 reverse proxy for Puma serving static asset acceleration and compression) bundles a precompiled Go binary built against Go stdlib v1.26.1. Thruster IS on the production request path (terminates HTTP/2, serves static assets). Mitigations: (a) thruster trusts only AWS ACM/ALB-issued certs in our deployment (chain originates from AWS root CA, not arbitrary), (b) ALB terminates TLS upstream so thruster sees pre-validated connections in the typical deployment topology -- but verify per-environment. Remediation: monitor basecamp/thruster for a release rebuilt against Go 1.26.2+; alternatively rebuild the binary in-house. **TODO: open follow-up issue 'Rebuild thruster with Go >= 1.26.2 (CVE-2026-32280/81/83/33810)'.**"
    nist_control: si-2
    reviewed_by: "@clem-field"
    discovery_date: "2026-05-06"
    next_review_date: "2026-06-05"

