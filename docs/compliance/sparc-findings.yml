  - cve_id: CVE-2026-4878
    package: libcap2
    installed_version: "1:2.66-4+deb12u2+b2"
    fixed_version: "none"
    severity: HIGH
    disposition: accepted
    rationale: "ACCEPTED RISK. TOCTOU race condition in libcap's cap_set_file() that allows a local unprivileged user with write access to a parent directory to redirect file capability updates. SPARC container runs as non-root UID 1000 with no Linux capabilities granted, no setcap operations performed at runtime, and no shared writable directories. Attack vector requires (a) local shell access with write permissions and (b) ability to invoke setcap on attacker-controlled paths -- neither exists in the container's runtime model. libcap2 is a transitive dependency of base-image utilities and is not invoked by the application. Remediation path: Debian Trixie upgrade or distroless base."
    nist_control: si-2
    reviewed_by: "@clem-field"
    discovery_date: "2026-05-06"
    next_review_date: "2026-06-05"

  - cve_id: CVE-2026-41989
    package: libgcrypt20
    installed_version: "1.10.1-3"
    fixed_version: "none"
    severity: HIGH
    disposition: false_positive
    rationale: "FALSE POSITIVE. Heap buffer overflow in libgcrypt's gcry_pk_decrypt via crafted ECDH ciphertext. SPARC does NOT use libgcrypt: all application-layer cryptography goes through OpenSSL (libssl3) via Rails encrypted credentials, JWT RS256 verification, ActiveSupport::KeyGenerator (HKDF), and the Ruby openssl extension. ECDH operations specifically are not invoked anywhere in SPARC. libgcrypt20 is a transitive dependency of base-image apt/curl utilities (removed via #342 Dockerfile hardening but library files remain in image inventory). Vulnerable code path is not loaded. Remediation path: monitor Debian patch availability; eliminate via distroless base."
    nist_control: si-2
    reviewed_by: "@clem-field"
    discovery_date: "2026-05-06"
    next_review_date: "2026-06-05"

