# sparc-findings.yml -- SPARC container image CVE disposition tracking
#
# Tracks all Trivy container scan findings against the production Docker
# image (ruby:3.4.4-slim / Debian Bookworm 12.13). Each finding is triaged,
# dispositioned, and documented for the FedRAMP authorization package.
#
# Disposition workflow: discovered -> triaged -> accepted/deferred/remediated
#
# Risk context: SPARC is a Rails application deployed as a containerized
# workload on ECS Fargate, EC2, and Azure. The container:
#   - Runs as non-root user (UID 1000, rails:rails)
#   - Multi-stage build -- no build tools in final image
#   - No interactive terminal, no SSH access
#   - Behind reverse proxy (ALB/nginx) with TLS termination
#   - Network whitelisting -- egress limited to PostgreSQL, Redis, S3
#   - Seccomp and namespace isolation (ECS Fargate/Docker default)
#   - Automated Trivy scanning on every build in CI/CD
#   - 30-day review cycle for all accepted findings
#
# Mitigating controls (deployment-agnostic, apply to all findings):
#   - AC-4: Network segmentation via security groups / NSGs
#   - CM-6: Hardened container configuration (non-root, read-only where possible)
#   - SC-7: Reverse proxy boundary protection with TLS
#   - SC-8: TLS 1.2+ for all data in transit
#   - SI-2: Continuous vulnerability monitoring with Trivy
#   - SI-3: Container image scanning for malware/vulnerabilities
#
# New HIGH or CRITICAL CVEs not in this baseline should block the build
# once issue #244 (security gate threshold) is implemented.

findings:

  # ==========================================================================
  # HIGH -- 4 unique CVEs
  # ==========================================================================

  - cve_id: CVE-2026-4046
    package: libc-bin
    installed_version: "2.36-9+deb12u13"
    fixed_version: "none"
    severity: HIGH
    disposition: false_positive
    rationale: "FALSE POSITIVE. glibc iconv vulnerability triggered only by IBM1390/IBM1399 character set conversions. SPARC exclusively uses UTF-8 encoding -- all file parser services enforce force_encoding('UTF-8'). No iconv calls, no IBM EBCDIC character set operations, no character set conversion in the application. Debian slim base image does not ship IBM charset locale data. Vulnerable code path is unreachable."
    nist_control: si-2
    reviewed_by: "@clem-field"
    discovery_date: "2026-04-03"
    next_review_date: "2026-05-03"

  - cve_id: CVE-2025-69720
    package: libncursesw6
    installed_version: "6.4-4"
    fixed_version: "none"
    severity: HIGH
    disposition: accepted
    rationale: "ACCEPTED RISK. Ruby readline extension links to libncursesw6 at compile time. Removing ncurses may cause the Ruby binary to fail on startup. No interactive terminal attached in production -- ncurses code paths are not exercised. Cannot safely remove without recompiling Ruby. Remediation path: Debian Trixie upgrade."
    nist_control: si-2
    reviewed_by: "@clem-field"
    discovery_date: "2026-04-03"
    next_review_date: "2026-05-03"

  - cve_id: CVE-2026-27135
    package: libnghttp2-14
    installed_version: "1.52.0-1+deb12u2"
    fixed_version: "none"
    severity: HIGH
    disposition: remediated
    rationale: "REMEDIATED. Package removed from production image via Dockerfile hardening (#342). Bootstrap stage isolates APT tools -- curl, gnupg, perl, and all transitive dependencies no longer present in the runtime container."
    nist_control: si-2
    reviewed_by: "@clem-field"
    discovery_date: "2026-04-03"
    next_review_date: "2026-05-03"

  - cve_id: CVE-2026-29111
    package: libsystemd0
    installed_version: "252.39-1~deb12u1"
    fixed_version: "none"
    severity: HIGH
    disposition: false_positive
    rationale: "FALSE POSITIVE. CVE requires systemd running as PID 1 receiving IPC API calls with spurious data. SPARC container runs Rails server as PID 1 (docker-entrypoint -> bin/rails server), not systemd. No D-Bus socket exists in the container, no systemd IPC calls in the codebase, no sd_bus/sd_notify/systemctl usage. libsystemd0 is a transitive dependency of the base image, never invoked. Attack vector is unreachable."
    nist_control: si-2
    reviewed_by: "@clem-field"
    discovery_date: "2026-04-03"
    next_review_date: "2026-05-03"

