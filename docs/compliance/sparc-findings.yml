    package: libgnutls30
    installed_version: "3.7.9-2+deb12u6"
    fixed_version: "none"
    severity: HIGH
    disposition: false_positive
    rationale: "FALSE POSITIVE. Heap buffer overflow in GnuTLS DTLS handshake fragment reassembly (merge_handshake_packet). Same surface as CVE-2026-33845 -- SPARC does NOT use DTLS or GnuTLS in any code path. TLS is via OpenSSL (libssl3); libgnutls30 is a transitive dep of base-image apt/curl utilities. Attack vector requires a remote DTLS peer; surface is not reachable. See CVE-2026-33845 rationale for full deployment context."
    nist_control: si-2
