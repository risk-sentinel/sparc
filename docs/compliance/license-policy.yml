# SPARC License Policy (#472)
# ==========================================================================
#
# Declarative license-disposition policy for the SBOM-driven license
# inventory built by scripts/ci/build_license_inventory.rb.
#
# The script reads this file plus the three CycloneDX SBOMs produced by
# the security workflow (sbom-ruby + trivy-fs-sbom + trivy-container-sbom)
# and emits two artifacts on every Security Scanning run:
#   - license-inventory.json   (machine-readable, for sparc-iac + audit)
#   - license-inventory.md     (human-readable, for compliance review)
#
# Component-level exceptions are tracked in license-dispositions.yml --
# this file is purely the per-LICENSE policy.
#
# Disposition workflow:
#   allowlist -> no action
#   warn_list -> action item generated, no CI failure
#   blocklist -> action item generated, CI failure when enforce=true
#   unmapped  -> action determined by unmapped_action
#
# CI enforcement starts WARN-ONLY (enforce: false) so we can observe the
# baseline before tightening. Flip enforce=true in a follow-up PR after
# the inventory has been reviewed against the existing dispositions.
# ==========================================================================

policy:
  # #479: enforce flipped to true after the spreadsheet GPL-3.0 runtime
  # concern was remediated (roo-xls removed; license-inventory warn
  # bucket reaches 0 outstanding action items). CI now fails on any
  # blocklist hit OR un-dispositioned warn-list license entering the
  # inventory. Operator-add dispositions in license-dispositions.yml to
  # resolve new flags rather than weakening the policy.
  enforce: true

  # SPDX IDs that need no review. Mainstream permissive + LGPL.
  # See: https://spdx.org/licenses/
  #
  # When adding entries, prefer the SPDX canonical form. Common non-SPDX
  # variants ("Apache 2.0" with a space, "public-domain") are normalized
  # by LICENSE_ALIASES in build_license_inventory.rb -- do NOT list both
  # variants here.
  allowlist:
    # Permissive
    - MIT
    - MIT-0
    # NOTE: MIT-X11 is normalized to MIT by LICENSE_ALIASES — no separate entry needed.
    - Apache-2.0
    - BSD-2-Clause
    - BSD-3-Clause
    - BSD-4-Clause      # historical "advertising" clause; still permissive
    - 0BSD
    - ISC
    - Python-2.0
    - Ruby
    - Unlicense
    - Zlib
    - WTFPL
    - Sleepycat         # Oracle BDB pre-AGPL; effectively permissive when not redistributing modifications
    - PostgreSQL        # MIT-like license used by libpq + related
    - OLDAP-2.8         # BSD-style, permissive (SPDX uses OLDAP-* not OpenLDAP-*)
    - Beerware          # MIT-like, single-component oddities

    # LGPL family (dynamic-linking compatible with closed source)
    - LGPL-2.1
    - LGPL-2.1-only
    - LGPL-2.1-or-later
    - LGPL-3.0
    - LGPL-3.0-only
    - LGPL-3.0-or-later

    # Weak copyleft (file-level)
    - MPL-2.0

    # Public-domain equivalents
    - CC0-1.0
    - CC-BY-3.0
    - CC-BY-4.0

    # Documentation licenses (no software components affected)
    - GFDL-1.3-no-invariants-or-later

    # SPDX expression with exception -- strictly more permissive than the
    # bare license, so treat as allowlist. Single-component occurrence on
    # a Debian library; expression preserved verbatim per SPDX rules.
    - "BSD-3-clause-Cambridge WITH BINARY-LIBRARY-LIKE-PACKAGES-exception"

  # Require review but do not block. Generate action items in the report.
  warn_list:
    - GPL-2.0
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0
    - GPL-3.0-only
    - GPL-3.0-or-later
    - AGPL-3.0
    - AGPL-3.0-only
    - AGPL-3.0-or-later
    - EPL-1.0
    - EPL-2.0
    - CDDL-1.0
    - CDDL-1.1
    - OFL-1.1
    - Artistic-2.0

  # Hard blocks: source-available / commercial-only / non-OSI.
  # Components matching these licenses generate fail-grade action items.
  blocklist:
    - SSPL-1.0
    - BUSL-1.1
    - Commons-Clause
    - Elastic-2.0
    - JSON          # the original "do not be evil" clause
    - NPOSL-3.0
    - PolyForm-Noncommercial-1.0.0
    - PolyForm-Strict-1.0.0
    - PolyForm-Small-Business-1.0.0
    - Confluent-Community-1.0
    - RPSL-1.0

  # How to treat components with NO license field (cdxgen path-only entries,
  # OS kernel objects without metadata, etc.). Options: ignore | warn | block
  unmapped_action: warn

  # Path patterns to skip entirely from policy checks. Useful when Trivy
  # emits SBOM rows for things like "./hdf-schema/dist/go" or vendored
  # binaries that aren't licensable in the usual sense.
  #
  # Each entry is a Ruby regex string (anchors required). After the first
  # full CI run, expand this list with patterns matching the most common
  # `unmapped` entries in license-inventory.md.
  skip_patterns:
    - "^\\./.*"                      # leading-dot relative paths (cdxgen evidence pseudo-entries)
    - "^usr/local/bin/"              # binaries in the container (hdf, etc.)
    - "^usr/local/bundle/.*\\.so$"   # native gem extensions (parent gem already covers license)
    - "^usr/local/bundle/.*/(exe|bin)/" # gem-shipped executables in the container
    - "^operating-system$"           # debian/ubuntu OS metarecord
    - "^debian$"                     # OS itself as a component
    - "^var/lib/dpkg/"               # dpkg internal status entries
    - "^usr/share/doc/"              # documentation directories
    - "^\\$\\{"                      # malformed entries with unresolved shell expansion
    # #475 — Trivy treats lockfiles themselves as "components" when scanning
    # filesystems; the entries inside them are the real components.
    - "^Gemfile\\.lock$"
    - "^.*\\.lock$"                  # tests/api/uv.lock and similar lockfile pseudo-entries
    # Vendored Go modules from the embedded `hdf` CLI binary. The binary
    # itself is dispositioned holistically (license-dispositions.yml ->
    # `hdf (vendored binary)`, Apache-2.0 from MITRE) so individual Go
    # dependencies are not itemized. License text for the binary lives at
    # LICENSES/MITRE-HDF-LIBS-LICENSE.
    - "^github\\.com/"
    - "^golang\\.org/x/"
    - "^golang\\.org/"               # remaining golang.org/ namespaces (non-x)
    - "^google\\.golang\\.org/"      # protobuf, grpc, etc.
    - "^gopkg\\.in/"                 # yaml.v3, mgo.v2, etc.
    - "^sigs\\.k8s\\.io/"            # kubernetes-sigs utilities
    - "^stdlib$"                     # Go standard library version pseudo-entries

  # Purl-based skip patterns (#481). When a component's name is the bare
  # package name (e.g. PyPI: `annotated-types`) but the purl reveals its
  # ecosystem (`pkg:pypi/annotated-types@0.7.0`), skip_patterns on `name`
  # can't filter the whole ecosystem. skip_purls fills that gap.
  #
  # Each entry is a Ruby regex string matched against the component purl.
  # Only purls that exist (non-null) are subject to this check.
  skip_purls:
    # All currently-tracked PyPI components are dependencies of the
    # tests/api/ Python test scaffold, which is not part of the SPARC
    # container image or any redistributed artifact. If SPARC ever adds
    # a production Python service, narrow this to a tests/api-only
    # filter or remove and add per-component dispositions.
    - "^pkg:pypi/"
