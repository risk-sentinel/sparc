# SPARC License Dispositions (#472)
# ==========================================================================
#
# Per-component license dispositions. Companion to license-policy.yml.
#
# When a component's license appears in license-policy.yml::warn_list or
# blocklist, the build_license_inventory.rb script generates an action item
# for it -- unless this file already records a disposition.
#
# Disposition values:
#   accepted    -- license is fine for SPARC's deployment model; reasoning
#                  documented in `rationale`. Reviewer + next_review_date set.
#   replace     -- the component should be swapped out for an allowlisted
#                  alternative. `target_component` documents the chosen
#                  replacement. Open until the gem is gone from Gemfile.lock.
#   waiver      -- a per-deployment legal waiver applies. Used carefully;
#                  must reference a tracking document.
#   remediated  -- dispositioned, then resolved (replaced/removed). Kept in
#                  the file for audit but treated as inactive by the report.
#
# Match strategy:
#   - `name`-only entries match any version of the component.
#   - `name` + `version` entries are version-specific (use for waivers tied
#     to specific upstream releases).
#   - The first matching entry wins; place more-specific entries first.
#
# Review cadence: 90 days per FedRAMP supply-chain controls. The script
# warns when next_review_date is in the past (still emits the action item).
# ==========================================================================

dispositions:
  # ── Application-layer (Ruby gem) GPL dispositions ────────────────────────

  # Brakeman ships under the "Brakeman Public Use License" -- a permissive,
  # MIT-style license that is not SPDX-registered. Single-component
  # exception; SPARC uses brakeman as a CI-only SAST tool (not shipped to
  # tenants), so we accept the non-SPDX license as compatible with our
  # Apache-2.0 distribution.
  - name: brakeman
    license: Brakeman Public Use License
    disposition: accepted
    rationale: "Permissive MIT-style license; brakeman is a dev/CI-only dependency (Gemfile dev group) -- never shipped in the SPARC container or to tenants. License text reviewed and confirmed compatible with Apache-2.0 redistribution constraints."
    nist_control: sa-15
    reviewed_by: "@clem-field"
    discovery_date: "2026-05-18"
    next_review_date: "2026-08-16"

  # bundler-audit ships under GPL-3.0-or-later. Used only as a CI-time
  # security scanner (Gemfile dev group) -- never loaded into the running
  # SPARC service and never redistributed. Same pattern as brakeman.
  - name: bundler-audit
    license: GPL-3.0-or-later
    disposition: accepted
    rationale: "Dev/CI-only dependency (Gemfile dev group). bundler-audit runs only in CI as a vulnerability scanner against Gemfile.lock; it is never loaded into the SPARC application process or shipped in the production container image. GPL-3.0-or-later does not trigger derivative-work obligations on SPARC's Apache-2.0 codebase because the gem is not linked at runtime."
    nist_control: sa-15
    reviewed_by: "@clem-field"
    discovery_date: "2026-05-18"
    next_review_date: "2026-08-16"

  # spreadsheet 1.3.4 is GPL-3.0-only. Used at RUNTIME for Excel parsing
  # (SspExcelParserService / SarExcelParserService). With SPARC about to be
  # open-sourced under Apache-2.0, this is a real incompatibility -- GPL-3.0
  # is strong copyleft; linking it into the Apache-2.0 service would force
  # the combined work under GPL-3.0 on redistribution.
  #
  # Replacement target: the `roo` gem (MIT) handles .xlsx parsing for our
  # current SAR/SSP imports; only legacy .xls (Excel 97-2003 binary format)
  # requires `spreadsheet`. Decision needed: drop .xls support OR find an
  # MIT-licensed .xls reader. Track replacement under a follow-up issue.
  # #479: REMEDIATED. roo-xls (the gem that pulled `spreadsheet` in as a
  # transitive) was removed from Gemfile. `spreadsheet 1.3.4` no longer
  # appears in Gemfile.lock; the GPL-3.0 runtime concern is fully closed
  # for the Apache-2.0 open-source release. The Excel upload/export UI
  # was scrubbed at the same time, though the underlying parser/export
  # services are preserved for API consumers using `roo` (MIT, .xlsx only).
  - name: spreadsheet
    version: "1.3.4"
    license: GPL-3.0-only
    disposition: remediated
    rationale: "RESOLVED via #479. roo-xls (transitive parent) removed from Gemfile; spreadsheet no longer present in Gemfile.lock. Excel UI references scrubbed from views. .xlsx parsing/export preserved via roo (MIT) for API consumers. Legacy .xls (Excel 97-2003) support was dropped as the trade-off."
    nist_control: sa-22
    reviewed_by: "@clem-field"
    discovery_date: "2026-05-18"
    next_review_date: "2026-08-16"

  # ── System-layer (Debian base image) GPL dispositions ────────────────────
  #
  # Generated from license-inventory.json for components where
  # source == "trivy-container" AND license matches GPL family. These are
  # all packages from the Debian Bookworm 12 base image. The single
  # rationale below applies uniformly: SPARC links these as dynamic OS-level
  # libraries, not derivative-work integrations. The FSF, ASF, and Linux
  # distro communities universally treat this pattern as separable from
  # the application copyright.
  #
  # When the base image rolls (e.g., to Trixie, distroless, or chiselled
  # Ubuntu), regenerate this section by re-running the inventory and
  # re-applying group-disposition logic.

