# SPARC License Dispositions (#472)
# ==========================================================================
#
# Per-component license dispositions. Companion to license-policy.yml.
#
# When a component's license appears in license-policy.yml::warn_list or
# blocklist, the build_license_inventory.rb script generates an action item
# for it -- unless this file already records a disposition.
#
# Disposition values:
#   accepted    -- license is fine for SPARC's deployment model; reasoning
#                  documented in `rationale`. Reviewer + next_review_date set.
#   replace     -- the component should be swapped out for an allowlisted
#                  alternative. `target_component` documents the chosen
#                  replacement. Open until the gem is gone from Gemfile.lock.
#   waiver      -- a per-deployment legal waiver applies. Used carefully;
#                  must reference a tracking document.
#   remediated  -- dispositioned, then resolved (replaced/removed). Kept in
#                  the file for audit but treated as inactive by the report.
#
# Match strategy:
#   - `name`-only entries match any version of the component.
#   - `name` + `version` entries are version-specific (use for waivers tied
#     to specific upstream releases).
#   - The first matching entry wins; place more-specific entries first.
#
# Review cadence: 90 days per FedRAMP supply-chain controls. The script
# warns when next_review_date is in the past (still emits the action item).
# ==========================================================================

dispositions:
  # Brakeman ships under the "Brakeman Public Use License" -- a permissive,
  # MIT-style license that is not SPDX-registered. Single-component
  # exception; SPARC uses brakeman as a CI-only SAST tool (not shipped to
  # tenants), so we accept the non-SPDX license as compatible with our
  # Apache-2.0 distribution.
  - name: brakeman
    license: Brakeman Public Use License
    disposition: accepted
    rationale: "Permissive MIT-style license; brakeman is a dev/CI-only dependency (Gemfile dev group) -- never shipped in the SPARC container or to tenants. License text reviewed and confirmed compatible with Apache-2.0 redistribution constraints."
    nist_control: sa-15
    reviewed_by: "@clem-field"
    discovery_date: "2026-05-18"
    next_review_date: "2026-08-16"


