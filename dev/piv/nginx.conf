# #790 — local mTLS proxy that reproduces the production PIV/CAC gateway contract.
#
# This is a TEST HARNESS, not deployment config: the real gateway lives in
# sparc-iac (#559). Its only job here is to prove SPARC's app-side PIV parsing +
# mapping + session flow end to end against a real proxy and a software-PIV
# client certificate — the same reason bin/test-db-tls stands up a real TLS
# Postgres rather than trusting a config value.
#
# It mirrors the exact header contract SPARC's defaults expect (nginx
# conventions): X-SSL-Client-Cert = the URL-escaped verified PEM, and
# X-SSL-Client-Verify = SUCCESS | FAILED | NONE.

events {}

http {
  server {
    listen 8443 ssl;
    server_name localhost;

    # Outer TLS for the browser/curl → proxy hop.
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # mTLS: verify the client cert against our test CA. `optional` (not `on`) so
    # the harness can also exercise the fail-closed direction — a request with
    # no client cert reaches the app with verify=NONE and must be rejected.
    ssl_client_certificate /etc/nginx/certs/ca.crt;
    ssl_verify_client      optional;
    ssl_verify_depth       2;

    location / {
      # Set BOTH headers from the verified handshake. proxy_set_header replaces
      # any client-supplied copy of the same name, so a client cannot inject a
      # forged verify result or certificate — this is the trust-boundary
      # property SPARC relies on ("the proxy strips client-supplied copies").
      proxy_set_header X-SSL-Client-Cert   $ssl_client_escaped_cert;
      proxy_set_header X-SSL-Client-Verify $ssl_client_verify;

      # Rails assume_ssl → Secure session cookie over the proxied hop.
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;

      proxy_pass http://web:3000;
    }
  }
}
