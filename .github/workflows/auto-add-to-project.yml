name: Add to SPARC Program Board

on:
  issues:
    types: [opened]

permissions:
  issues: read

jobs:
  add-to-project:
    name: Add issue to program board
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1
        with:
          project-url: https://github.com/orgs/Rebel-Raiders/projects/3
          github-token: ${{ secrets.PROJECT_TOKEN }}
