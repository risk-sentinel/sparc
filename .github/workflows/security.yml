name: Security Scanning

on:
  pull_request:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      run_semgrep:
        description: 'Also run Semgrep SAST scan (Brakeman + CodeQL always run)'
        required: false
        default: false
        type: boolean
      rails_app_path:
        description: 'Path to Rails application root'
        required: false
        default: '.'
        type: string
      dockerfile_path:
        description: 'Path to Dockerfile for container scan'
        required: false
        default: './Dockerfile'
        type: string
      org_metadata_file:
        description: 'Path to OSCAL metadata JSON'
        required: false
        default: '.github/oscal-metadata.json'
        type: string
      fail_on_severity:
        description: 'Minimum severity to fail the workflow'
        required: false
        default: 'none'
        type: choice
        options:
          - critical
          - high
          - medium
          - low
          - none
      upload_to_code_scanning:
        description: 'Upload SARIF results to GitHub Code Scanning (requires GHAS for private repos)'
        required: false
        default: false
        type: boolean

# Defaults for non-dispatch triggers (inputs will be null)
env:
  RUN_SEMGREP: ${{ inputs.run_semgrep || 'false' }}
  RAILS_APP_PATH: ${{ inputs.rails_app_path || '.' }}
  DOCKERFILE_PATH: ${{ inputs.dockerfile_path || './Dockerfile' }}
  ORG_METADATA_FILE: ${{ inputs.org_metadata_file || '.github/oscal-metadata.json' }}
  FAIL_ON_SEVERITY: ${{ inputs.fail_on_severity || 'none' }}
  # Default OFF: Code Scanning SARIF upload requires GitHub Advanced
  # Security on private repos (paid feature). SARIF files are still
  # preserved as workflow artifacts and uploaded to S3 by the archive
  # job, so nothing is lost. Flip to true (or enable GHAS) once the
  # repo is public or GHAS is licensed.
  UPLOAD_TO_CODE_SCANNING: ${{ inputs.upload_to_code_scanning == '' && 'false' || inputs.upload_to_code_scanning }}

permissions:
  contents: read
  security-events: write
  actions: read      # Required for cross-repo artifact access
  id-token: write    # OIDC for AWS credential assumption (S3 upload, ECR)

# ═══════════════════════════════════════════════════════════════════
# Parallel Scan Jobs (1–9)
# ═══════════════════════════════════════════════════════════════════

jobs:

  # ── Path filter: skip expensive scans on workflow-only PRs ─────
  # On PRs, detect whether app code changed. If only workflow YAML
  # or docs changed, scan jobs skip but still report status (as
  # skipped) so branch protection required checks pass.
  # On push/schedule/dispatch, scans always run (app_code not evaluated).
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    outputs:
      app_code: ${{ steps.filter.outputs.app_code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            app_code:
              - '**.rb'
              - 'Gemfile*'
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - '.github/workflows/security.yml'
              - '.github/oscal-metadata.json'
              - '.trivyignore'
              - 'config/**'
              - 'app/**'
              - 'lib/**'
              - 'db/**'
              - 'spec/**'
              - 'bin/**'
              - 'docs/compliance/**'

  # ── 1. Secrets Scan (Gitleaks) ─────────────────────────────────
  secrets_scan:
    runs-on: ubuntu-latest
    needs: [ changes ]
    if: always() && (needs.changes.outputs.app_code == 'true' || github.event_name != 'pull_request')
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Cache Gitleaks binary
        id: gitleaks-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: /usr/local/bin/gitleaks
          key: gitleaks-${{ runner.os }}-8.24.0

      - name: Install Gitleaks
        if: steps.gitleaks-cache.outputs.cache-hit != 'true'
        run: |
          GITLEAKS_VERSION="8.24.0"  # Pinned — avoids GitHub API rate limit failures
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --report-format sarif --report-path gitleaks-results.sarif --no-banner -v
        continue-on-error: true

      - name: Upload Gitleaks SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && env.UPLOAD_TO_CODE_SCANNING == 'true'
        continue-on-error: true
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks

      - name: Upload Gitleaks SARIF as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: gitleaks-sarif
          path: gitleaks-results.sarif
          retention-days: 90
          if-no-files-found: warn

  # ── 2a. Brakeman SAST (always-on, Rails-specific) ─────────────
  brakeman_scan:
    runs-on: ubuntu-latest
    needs: [ changes ]
    if: always() && (needs.changes.outputs.app_code == 'true' || github.event_name != 'pull_request')
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run Brakeman
        run: bin/brakeman --no-pager --format sarif --output brakeman-results.sarif
        working-directory: ${{ env.RAILS_APP_PATH }}
        continue-on-error: true

      - name: Upload Brakeman SARIF to Code Scanning
        if: always() && env.UPLOAD_TO_CODE_SCANNING == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        continue-on-error: true
        with:
          sarif_file: brakeman-results.sarif
          category: sast-brakeman

      - name: Upload Brakeman SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: brakeman-sarif
          path: brakeman-results.sarif
          retention-days: 90
          if-no-files-found: warn

  # ── 2b. CodeQL SAST (always-on, deep semantic analysis) ──────
  # Scoped to Ruby only — SPARC uses importmap with minimal Stimulus
  # controllers (no Node build step). JS/TS analysis doubled scan time
  # with negligible security value. Brakeman covers Ruby SAST.
  # See issue #346 for analysis.
  codeql_scan:
    runs-on: ubuntu-latest
    needs: [ changes ]
    if: always() && (needs.changes.outputs.app_code == 'true' || github.event_name != 'pull_request')
    permissions:
      contents: read
      security-events: write
      actions: read  # Required for CodeQL
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ruby
          config: |
            paths:
              - app
              - lib
              - config
            paths-ignore:
              - spec
              - docs
              - vendor
              - node_modules

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          output: codeql-results
          category: codeql-sast
          upload: false  # We upload manually for artifact control
        continue-on-error: true

      - name: Prepare CodeQL SARIF
        if: always()
        run: |
          # Single language (Ruby) produces one SARIF — no merge needed
          SARIF_FILE=$(find codeql-results/ -name '*.sarif' -print -quit 2>/dev/null)
          if [ -n "$SARIF_FILE" ]; then
            cp "$SARIF_FILE" codeql-results.sarif
          else
            echo "::warning::No CodeQL SARIF file found"
          fi

      - name: Upload CodeQL SARIF to Code Scanning
        if: always() && env.UPLOAD_TO_CODE_SCANNING == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        continue-on-error: true
        with:
          sarif_file: codeql-results.sarif
          category: sast-codeql

      - name: Upload CodeQL SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: codeql-sarif
          path: codeql-results.sarif
          retention-days: 90
          if-no-files-found: warn

  # ── 2c. Semgrep SAST (optional, via workflow_dispatch) ───────
  semgrep_scan:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_semgrep == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: p/ruby p/rails
        continue-on-error: true

      - name: Run Semgrep SARIF output
        run: |
          pip3 install semgrep
          semgrep --config p/ruby --config p/rails --sarif --output semgrep-results.sarif ${{ env.RAILS_APP_PATH }}
        continue-on-error: true

      - name: Upload Semgrep SARIF to Code Scanning
        if: always() && env.UPLOAD_TO_CODE_SCANNING == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        continue-on-error: true
        with:
          sarif_file: semgrep-results.sarif
          category: sast-semgrep

      - name: Upload Semgrep SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: semgrep-sarif
          path: semgrep-results.sarif
          retention-days: 90
          if-no-files-found: warn

  # ── 3. Dependency Audit (bundler-audit) ────────────────────────
  dependency_audit:
    runs-on: ubuntu-latest
    needs: [ changes ]
    if: always() && (needs.changes.outputs.app_code == 'true' || github.event_name != 'pull_request')
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Cache bundler-audit advisory DB
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.local/share/ruby-advisory-db
          key: bundler-audit-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: bundler-audit-db-${{ runner.os }}-

      - name: Update bundler-audit advisory database
        run: bundle exec bundle-audit update

      - name: Run bundler-audit
        run: bundle exec bundle-audit check --format json --output bundler-audit-results.json
        continue-on-error: true

      - name: Upload bundler-audit results as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: bundler-audit-json
          path: bundler-audit-results.json
          retention-days: 90

  # ── 4. JavaScript Dependency Audit (importmap) ─────────────────
  importmap_audit:
    runs-on: ubuntu-latest
    needs: [ changes ]
    if: always() && (needs.changes.outputs.app_code == 'true' || github.event_name != 'pull_request')
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit
        continue-on-error: true

  # ── 5. Trivy Filesystem Scan ───────────────────────────────────
  trivy_fs_scan:
    runs-on: ubuntu-latest
    needs: [ changes ]
    if: always() && (needs.changes.outputs.app_code == 'true' || github.event_name != 'pull_request')
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache Trivy binary
        id: trivy-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: /usr/local/bin/trivy
          key: trivy-${{ runner.os }}-0.69.3

      - name: Install Trivy
        if: steps.trivy-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy=0.69.3
          sudo cp $(which trivy) /usr/local/bin/trivy

      - name: Run Trivy filesystem scan (SARIF)
        run: trivy fs --format sarif --output trivy-fs-results.sarif --severity CRITICAL,HIGH,MEDIUM --scanners vuln,misconfig,secret .
        continue-on-error: true

      - name: Upload Trivy FS SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && env.UPLOAD_TO_CODE_SCANNING == 'true'
        continue-on-error: true
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs

      - name: Run Trivy filesystem scan (CycloneDX for SAF)
        # #472 — `license` scanner adds component license fields to the
        # CycloneDX output (zero coverage without it on filesystem scans).
        run: trivy fs --format cyclonedx --output trivy-fs-sbom.cdx.json --scanners vuln,license .
        continue-on-error: true

      - name: Upload Trivy FS artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: trivy-fs-results
          path: |
            trivy-fs-results.sarif
            trivy-fs-sbom.cdx.json
          retention-days: 90
          if-no-files-found: warn

  # ── 6. Trivy Container Scan ────────────────────────────────────
  trivy_container_scan:
    runs-on: ubuntu-latest
    needs: [ changes ]
    if: always() && (needs.changes.outputs.app_code == 'true' || github.event_name != 'pull_request')
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build Docker image with layer caching
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          load: true
          tags: sparc:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cache Trivy binary
        id: trivy-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: /usr/local/bin/trivy
          key: trivy-${{ runner.os }}-0.69.3

      - name: Install Trivy
        if: steps.trivy-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy=0.69.3
          sudo cp $(which trivy) /usr/local/bin/trivy

      - name: Run Trivy container scan (SARIF)
        run: trivy image --format sarif --output trivy-container-results.sarif --severity CRITICAL,HIGH --scanners vuln sparc:${{ github.sha }}
        continue-on-error: true

      - name: Upload Trivy container SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && env.UPLOAD_TO_CODE_SCANNING == 'true'
        continue-on-error: true
        with:
          sarif_file: trivy-container-results.sarif
          category: trivy-container

      - name: Cache Trivy ASFF template
        id: asff-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: contrib/asff.tpl
          key: trivy-asff-tpl-v1

      - name: Download Trivy ASFF template
        if: steps.asff-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p contrib
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/asff.tpl -o contrib/asff.tpl

      - name: Run Trivy container scan (ASFF for SAF trivy2hdf)
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: trivy image --format template --template "@contrib/asff.tpl" --output trivy-container-asff.json --scanners vuln sparc:${{ github.sha }}
        continue-on-error: true

      - name: Run Trivy container scan (CycloneDX for SAF)
        # #472 — `license` scanner closes the ~21% license gap in the
        # container SBOM (Debian packages get license metadata populated).
        run: trivy image --format cyclonedx --output trivy-container-sbom.cdx.json --scanners vuln,license sparc:${{ github.sha }}
        continue-on-error: true

      - name: Upload Trivy container artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: trivy-container-results
          path: |
            trivy-container-results.sarif
            trivy-container-asff.json
            trivy-container-sbom.cdx.json
          retention-days: 90
          if-no-files-found: warn

  # ── 7. SBOM Generation (CycloneDX) ────────────────────────────
  # #463 — switched from `cyclonedx-ruby` gem (v1.1.0 — only emits XML,
  # misleadingly with a .cdx.json extension) to @cyclonedx/cdxgen which
  # emits the actual CycloneDX JSON spec. SAF CLI's cyclonedx_sbom2hdf
  # and Grype both require JSON; XML input fails parsing silently.
  sbom_generation:
    runs-on: ubuntu-latest
    needs: [ changes ]
    if: always() && (needs.changes.outputs.app_code == 'true' || github.event_name != 'pull_request')
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up Node 22 (for cdxgen)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Generate CycloneDX SBOM (JSON via cdxgen)
        env:
          # cdxgen settings: Ruby project, JSON output, no auto-upload anywhere
          FETCH_LICENSE: 'true'
        run: |
          npx --yes @cyclonedx/cdxgen@11 -t ruby -o sbom-ruby.cdx.json .
          echo "--- SBOM head ---"
          head -c 300 sbom-ruby.cdx.json
          echo
          jq '{bomFormat, specVersion, components: (.components | length)}' sbom-ruby.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: sbom-cyclonedx
          path: sbom-ruby.cdx.json
          retention-days: 90

  # ── 8. Grype SBOM Vulnerability Scan ──────────────────────────
  # Issue #461 — consume the CycloneDX SBOMs produced by sbom_generation
  # and the Trivy fs/container scans, and run Grype against each. Grype
  # is the authoritative SBOM-driven SCA layer; Trivy's own vuln scan
  # stays in place as a second source against the raw filesystem and
  # image. SARIF goes to Code Scanning; JSON is normalized to HDF by the
  # downstream normalize_hdf job via SAF CLI (anchoregrype2hdf).
  grype_sbom_scan:
    runs-on: ubuntu-latest
    needs: [ changes, sbom_generation, trivy_fs_scan, trivy_container_scan ]
    if: always() && (needs.changes.outputs.app_code == 'true' || github.event_name != 'pull_request')
    permissions:
      contents: read
      security-events: write
    env:
      GRYPE_VERSION: v0.91.0
      # Ramp: start at critical only so the first PR's findings don't
      # block merge. Bump to high once baseline is triaged.
      GRYPE_FAIL_ON: critical
    steps:
      # ── Honor CVE dispositions (#593) ──────────────────────────────────
      # docs/compliance/sparc-findings.yml is the single source of truth for
      # triaged container CVEs (false_positive / accepted / deferred). Derive a
      # Grype ignore list from it so this fast --fail-on gate does not block on
      # CVEs already dispositioned there. The authoritative threshold
      # accounting (deferred criticals still fail) runs in the security_gate
      # job, which amends the same file into the HDF before validate.
      - name: Checkout disposition registry
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: docs/compliance/sparc-findings.yml
          sparse-checkout-cone-mode: false

      - name: Set up Ruby (ignore-list generator only — no bundle)
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: 3.4

      - name: Generate Grype ignore list from sparc-findings.yml
        run: |
          ruby -ryaml -e '
            data  = YAML.safe_load(File.read("docs/compliance/sparc-findings.yml"))
            rules = Array(data && data["findings"]).map { |f|
              next nil unless f["cve_id"]
              r = { "vulnerability" => f["cve_id"] }
              r["package"] = { "name" => f["package"] } if f["package"] && !f["package"].to_s.empty?
              r
            }.compact.uniq
            File.write(".grype.yaml", { "ignore" => rules }.to_yaml)
            warn "Grype: #{rules.size} dispositioned CVE(s) loaded from sparc-findings.yml"
          '
          echo "Generated .grype.yaml with $(grep -c 'vulnerability:' .grype.yaml) ignore rule(s)"

      - name: Cache Grype binary
        id: grype-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: /usr/local/bin/grype
          key: grype-${{ runner.os }}-${{ env.GRYPE_VERSION }}

      - name: Install Grype
        if: steps.grype-cache.outputs.cache-hit != 'true'
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin "${GRYPE_VERSION}"
          grype version

      - name: Cache Grype vulnerability DB
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.cache/grype/db
          # Weekly key — DB updates daily but weekly cache balances freshness vs hit rate
          key: grype-db-${{ runner.os }}-${{ env.GRYPE_VERSION }}-$(date +%Y%U)

      - name: Download Ruby SBOM (sbom_generation)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom-cyclonedx
          path: sboms/ruby/

      - name: Download Trivy FS SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: trivy-fs-results
          path: sboms/trivy-fs/

      - name: Download Trivy container SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: trivy-container-results
          path: sboms/trivy-container/

      - name: Create output directory
        run: mkdir -p grype-results

      - name: Scan Ruby SBOM (sbom-ruby.cdx.json)
        continue-on-error: true
        run: |
          grype "sbom:sboms/ruby/sbom-ruby.cdx.json" \
            --fail-on "${GRYPE_FAIL_ON}" \
            -o sarif=grype-results/grype-ruby.sarif \
            -o json=grype-results/grype-ruby.json

      - name: Scan Trivy FS SBOM (trivy-fs-sbom.cdx.json)
        continue-on-error: true
        run: |
          grype "sbom:sboms/trivy-fs/trivy-fs-sbom.cdx.json" \
            --fail-on "${GRYPE_FAIL_ON}" \
            -o sarif=grype-results/grype-fs.sarif \
            -o json=grype-results/grype-fs.json

      - name: Scan Trivy container SBOM (trivy-container-sbom.cdx.json)
        continue-on-error: true
        run: |
          grype "sbom:sboms/trivy-container/trivy-container-sbom.cdx.json" \
            --fail-on "${GRYPE_FAIL_ON}" \
            -o sarif=grype-results/grype-container.sarif \
            -o json=grype-results/grype-container.json

      - name: Upload Ruby SBOM SARIF to Code Scanning
        if: always() && env.UPLOAD_TO_CODE_SCANNING == 'true' && hashFiles('grype-results/grype-ruby.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: grype-results/grype-ruby.sarif
          category: grype-sbom-ruby

      - name: Upload Trivy FS SBOM SARIF to Code Scanning
        if: always() && env.UPLOAD_TO_CODE_SCANNING == 'true' && hashFiles('grype-results/grype-fs.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: grype-results/grype-fs.sarif
          category: grype-sbom-trivy-fs

      - name: Upload Trivy container SBOM SARIF to Code Scanning
        if: always() && env.UPLOAD_TO_CODE_SCANNING == 'true' && hashFiles('grype-results/grype-container.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: grype-results/grype-container.sarif
          category: grype-sbom-trivy-container

      - name: Upload Grype artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: grype-sbom-results
          path: grype-results/
          retention-days: 90
          if-no-files-found: warn

      - name: Enforce fail threshold
        if: always()
        run: |
          # Re-run Grype with --fail-on enforcing — the per-SBOM steps used
          # continue-on-error to ensure all three scans run and artifacts are
          # uploaded. This step gates the job once everything is captured.
          FAILED=0
          for sbom in \
            "sboms/ruby/sbom-ruby.cdx.json" \
            "sboms/trivy-fs/trivy-fs-sbom.cdx.json" \
            "sboms/trivy-container/trivy-container-sbom.cdx.json"; do
            if [ -f "$sbom" ]; then
              if ! grype "sbom:$sbom" --fail-on "${GRYPE_FAIL_ON}" -o table > /dev/null 2>&1; then
                echo "::error::Grype found ${GRYPE_FAIL_ON}+ vulnerabilities in $sbom"
                FAILED=1
              fi
            fi
          done
          exit $FAILED

  # ── 9. License Inventory (#472) ──────────────────────────────────
  # Consolidates the three CycloneDX SBOMs (Ruby + Trivy fs + Trivy
  # container) into a single license-inventory.{json,md} artifact via
  # scripts/ci/build_license_inventory.rb. Applies docs/compliance/
  # license-policy.yml with per-component exceptions from license-
  # dispositions.yml, producing both machine-readable and human-
  # readable outputs plus an action-item list for warn/block hits.
  #
  # Enforcement is policy-controlled (license-policy.yml -> policy.enforce).
  # Initial release: warn-only. Flip enforce: true in a follow-up PR
  # after operators baseline the inventory.
  license_inventory:
    runs-on: ubuntu-latest
    needs: [ changes, sbom_generation, trivy_fs_scan, trivy_container_scan ]
    if: always() && (needs.changes.outputs.app_code == 'true' || github.event_name != 'pull_request')
    permissions:
      contents: read
    steps:
      - name: Checkout (script + policy + dispositions)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            scripts/ci/build_license_inventory.rb
            docs/compliance/license-policy.yml
            docs/compliance/license-dispositions.yml
          sparse-checkout-cone-mode: false

      - name: Set up Ruby (matches the rest of the security workflow)
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: "3.4"

      - name: Download Ruby SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom-cyclonedx
          path: sboms/ruby/

      - name: Download Trivy FS SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: trivy-fs-results
          path: sboms/trivy-fs/

      - name: Download Trivy container SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: trivy-container-results
          path: sboms/trivy-container/

      - name: Build license inventory
        run: |
          mkdir -p license-results
          ruby scripts/ci/build_license_inventory.rb \
            --sbom sbom-ruby:sboms/ruby/sbom-ruby.cdx.json \
            --sbom trivy-fs:sboms/trivy-fs/trivy-fs-sbom.cdx.json \
            --sbom trivy-container:sboms/trivy-container/trivy-container-sbom.cdx.json \
            --policy docs/compliance/license-policy.yml \
            --dispositions docs/compliance/license-dispositions.yml \
            --out-json license-results/license-inventory.json \
            --out-md   license-results/license-inventory.md \
            --out-merged-sbom license-results/sparc-combined-sbom.cdx.json \
            --git-sha "${{ github.sha }}"

      - name: Append summary to GitHub Step Summary
        if: always()
        run: |
          if [ -f license-results/license-inventory.md ]; then
            cat license-results/license-inventory.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload license inventory artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: license-inventory
          path: license-results/
          retention-days: 90
          if-no-files-found: warn

  # ═══════════════════════════════════════════════════════════════
  # Sequential: SAF CLI HDF Normalization
  # ═══════════════════════════════════════════════════════════════

  normalize_hdf:
    runs-on: ubuntu-latest
    needs:
      - changes
      - secrets_scan
      - brakeman_scan
      - codeql_scan
      - semgrep_scan
      - dependency_audit
      - importmap_audit
      - trivy_fs_scan
      - trivy_container_scan
      - sbom_generation
      - grype_sbom_scan
    if: always() && (needs.changes.outputs.app_code == 'true' || github.event_name != 'pull_request')
    steps:
      - name: Checkout code (for OSCAL metadata)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            .github/oscal-metadata.json

      - name: Download SARIF scan artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: scan-results/
          pattern: '*-sarif'

      - name: Download Trivy scan artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: scan-results/
          pattern: 'trivy-*-results'

      - name: Download SBOM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: scan-results/
          name: sbom-cyclonedx

      - name: Download bundler-audit artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: scan-results/
          name: bundler-audit-json

      - name: Download Grype SBOM scan artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: scan-results/
          name: grype-sbom-results

      - name: Create HDF output directory
        run: mkdir -p hdf-results

      - name: List downloaded artifacts
        run: find scan-results/ -type f | sort

      # ── Parallel SARIF/SBOM/ASFF → HDF conversions ──
      # All conversions run in parallel via background processes for ~3x speedup
      #
      # #463 — @mitre/saf transitively depends on @mitre/heimdall-lite which
      # requires Node >=22. The default ubuntu-latest runner Node (v20.x)
      # produces an EBADENGINE *warning* (not error), so npm install completes
      # but cyclonedx_sbom2hdf + anchoregrype2hdf silently fail at runtime
      # with MODULE_NOT_FOUND. Pin Node 22 + a known-good @mitre/saf version.
      - name: Set up Node 22 (required by @mitre/saf transitive deps)
        if: always()
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install SAF CLI
        if: always()
        run: npm install -g @mitre/saf@1.6.0

      - name: Verify SAF CLI converters are available
        if: always()
        run: |
          saf --version
          echo "Available SAF converters (expect all 4 listed):"
          saf convert --help 2>&1 | grep -E "sarif2hdf|trivy2hdf|cyclonedx_sbom2hdf|anchoregrype2hdf" || {
            echo "::error::One or more expected SAF converters are missing"
            exit 1
          }

      - name: Convert all scan results to HDF (parallel)
        if: always()
        continue-on-error: true
        run: |
          echo "Starting parallel HDF conversions..."

          # Resolve full path — npm global bin may not be on PATH in subshells
          SAF_BIN=$(which saf 2>/dev/null || echo "$(npm config get prefix)/bin/saf")
          if [ ! -x "$SAF_BIN" ]; then
            echo "::warning::SAF CLI not found — skipping HDF conversions"
            exit 0
          fi
          echo "SAF CLI: $SAF_BIN"

          mkdir -p hdf-results hdf-conversion-logs
          PIDS=()
          LOGS=()

          # #463 — capture per-conversion stdout+stderr to a log file so
          # background-process errors surface in CI logs instead of being
          # swallowed by pipe buffering.
          run_convert() {
            local input="$1"; shift
            if [ -f "$input" ]; then
              local logfile="hdf-conversion-logs/conv-${#PIDS[@]}.log"
              ( "$SAF_BIN" "$@" > "$logfile" 2>&1 ) &
              PIDS+=($!)
              LOGS+=("$logfile")
            fi
          }

          # SARIF → HDF
          run_convert scan-results/gitleaks-sarif/gitleaks-results.sarif \
            convert sarif2hdf -i scan-results/gitleaks-sarif/gitleaks-results.sarif -o hdf-results/gitleaks.hdf.json -w

          run_convert scan-results/brakeman-sarif/brakeman-results.sarif \
            convert sarif2hdf -i scan-results/brakeman-sarif/brakeman-results.sarif -o hdf-results/brakeman.hdf.json -w

          run_convert scan-results/codeql-sarif/codeql-results.sarif \
            convert sarif2hdf -i scan-results/codeql-sarif/codeql-results.sarif -o hdf-results/codeql.hdf.json -w

          run_convert scan-results/semgrep-sarif/semgrep-results.sarif \
            convert sarif2hdf -i scan-results/semgrep-sarif/semgrep-results.sarif -o hdf-results/semgrep.hdf.json -w

          run_convert scan-results/trivy-fs-results/trivy-fs-results.sarif \
            convert sarif2hdf -i scan-results/trivy-fs-results/trivy-fs-results.sarif -o hdf-results/trivy-fs.hdf.json -w

          # Trivy Container ASFF → HDF
          run_convert scan-results/trivy-container-results/trivy-container-asff.json \
            convert trivy2hdf -i scan-results/trivy-container-results/trivy-container-asff.json -o hdf-results/trivy-container.hdf.json

          # CycloneDX SBOM → HDF
          run_convert scan-results/trivy-fs-results/trivy-fs-sbom.cdx.json \
            convert cyclonedx_sbom2hdf -i scan-results/trivy-fs-results/trivy-fs-sbom.cdx.json -o hdf-results/trivy-fs-sbom.hdf.json

          run_convert scan-results/trivy-container-results/trivy-container-sbom.cdx.json \
            convert cyclonedx_sbom2hdf -i scan-results/trivy-container-results/trivy-container-sbom.cdx.json -o hdf-results/trivy-container-sbom.hdf.json

          # #463 — download-artifact@v8 with `name:` (vs `pattern:`) extracts
          # files directly into `path:` rather than a name-prefixed subdir.
          # The sbom-cyclonedx and grype-sbom-results artifacts land at the
          # scan-results/ root, not under a per-artifact subdirectory.
          run_convert scan-results/sbom-ruby.cdx.json \
            convert cyclonedx_sbom2hdf -i scan-results/sbom-ruby.cdx.json -o hdf-results/sbom-ruby.hdf.json

          # Grype JSON → HDF (#461 — SBOM-driven SCA findings)
          run_convert scan-results/grype-ruby.json \
            convert anchoregrype2hdf -i scan-results/grype-ruby.json -o hdf-results/grype-ruby.hdf.json

          run_convert scan-results/grype-fs.json \
            convert anchoregrype2hdf -i scan-results/grype-fs.json -o hdf-results/grype-fs.hdf.json

          run_convert scan-results/grype-container.json \
            convert anchoregrype2hdf -i scan-results/grype-container.json -o hdf-results/grype-container.hdf.json

          # Wait for all conversions to complete; track failures by index
          # so we can dump the matching log file for diagnosis.
          FAILED=0
          FAILED_INDICES=()
          for i in "${!PIDS[@]}"; do
            if ! wait "${PIDS[$i]}" 2>/dev/null; then
              FAILED=$((FAILED + 1))
              FAILED_INDICES+=("$i")
            fi
          done

          HDF_COUNT=$(find hdf-results -name '*.hdf.json' 2>/dev/null | wc -l)
          echo "Conversions complete: $HDF_COUNT HDF files generated ($FAILED failures)"

          # #463 — surface failing conversion output so future converter
          # regressions are visible instead of silently dropped.
          if [ "$FAILED" -gt 0 ]; then
            echo "::group::Failed conversion logs"
            for i in "${FAILED_INDICES[@]}"; do
              echo "--- ${LOGS[$i]} ---"
              cat "${LOGS[$i]}" || true
            done
            echo "::endgroup::"
          fi

      - name: Supplement HDF files with OSCAL metadata
        if: always()
        run: |
          echo "Supplementing HDF files with OSCAL metadata from ${{ env.ORG_METADATA_FILE }}..."
          for hdf_file in hdf-results/*.hdf.json; do
            [ -f "$hdf_file" ] || continue
            echo "  Supplementing $(basename $hdf_file)..."
            # #463 — reuse the globally-installed pinned SAF CLI; previously
            # this used `npx --yes @mitre/saf` which would re-resolve `latest`
            # and could pull a different version than the install step above.
            saf supplement passthrough write \
              -i "$hdf_file" \
              -f "${{ env.ORG_METADATA_FILE }}" \
              -o "$hdf_file" 2>&1 || echo "  Warning: supplement failed for $(basename $hdf_file)"
          done
          echo "  Done. $(ls hdf-results/*.hdf.json 2>/dev/null | wc -l) HDF files processed."

      - name: Upload conversion logs (debug)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: hdf-conversion-logs
          path: hdf-conversion-logs/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload HDF results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: hdf-results
          path: hdf-results/
          retention-days: 90
          if-no-files-found: warn

  # ═══════════════════════════════════════════════════════════════
  # Sequential: Bundle Results & Summary
  # ═══════════════════════════════════════════════════════════════

  bundle_results:
    runs-on: ubuntu-latest
    needs: [ changes, normalize_hdf, license_inventory ]
    if: always() && (needs.changes.outputs.app_code == 'true' || github.event_name != 'pull_request')
    steps:
      - name: Download HDF results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: hdf-results
          path: hdf-results/
        continue-on-error: true

      - name: Download SARIF artifacts for archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: all-results/
          pattern: '*-sarif'

      - name: Download Trivy artifacts for archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: all-results/
          pattern: 'trivy-*-results'

      - name: Download SBOM artifact for archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: all-results/
          name: sbom-cyclonedx

      - name: Download bundler-audit artifact for archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: all-results/
          name: bundler-audit-json

      - name: Download Grype SBOM artifacts for archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: all-results/
          name: grype-sbom-results

      - name: Download license inventory for archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: all-results/
          name: license-inventory
        continue-on-error: true

      - name: Download HDF results for archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: all-results/
          name: hdf-results

      # #386: SAF CLI `view summary` does not accept a directory for -i.
      # Build an explicit `-i <file>` list from the downloaded HDF results.
      - name: Build SAF view summary args
        if: always()
        id: saf_args
        run: |
          files=()
          for f in hdf-results/*.hdf.json; do
            [ -f "$f" ] || continue
            files+=("-i" "$f")
          done
          if [ ${#files[@]} -eq 0 ]; then
            echo "args=" >> $GITHUB_OUTPUT
            echo "::warning::No HDF files found in hdf-results/ — skipping SAF view summary"
          else
            echo "args=${files[*]}" >> $GITHUB_OUTPUT
          fi

      - name: Generate GitHub Step Summary
        if: always() && steps.saf_args.outputs.args != ''
        uses: mitre/saf_action@a19f76ed3721c14aa8a1afb8eded117d8bf16a5d # v1
        continue-on-error: true
        with:
          command_string: 'view summary ${{ steps.saf_args.outputs.args }}'

      - name: Write summary header
        if: always()
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **SAST Scanners** | Brakeman + CodeQL (always-on)${{ env.RUN_SEMGREP == 'true' && ' + Semgrep' || '' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Fail Severity** | ${{ env.FAIL_ON_SEVERITY }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run ID** | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Git SHA** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### HDF Files Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for hdf_file in hdf-results/*.hdf.json; do
            [ -f "$hdf_file" ] || continue
            echo "- \`$(basename $hdf_file)\`" >> $GITHUB_STEP_SUMMARY
          done

      - name: Create combined ZIP archive
        if: always()
        run: |
          mkdir -p combined-archive/hdf combined-archive/sarif combined-archive/sbom combined-archive/asff
          cp hdf-results/*.hdf.json combined-archive/hdf/ 2>/dev/null || true
          cp all-results/gitleaks-sarif/*.sarif combined-archive/sarif/ 2>/dev/null || true
          cp all-results/brakeman-sarif/*.sarif combined-archive/sarif/ 2>/dev/null || true
          cp all-results/codeql-sarif/*.sarif combined-archive/sarif/ 2>/dev/null || true
          cp all-results/semgrep-sarif/*.sarif combined-archive/sarif/ 2>/dev/null || true
          cp all-results/trivy-fs-results/*.sarif combined-archive/sarif/ 2>/dev/null || true
          cp all-results/trivy-container-results/*.sarif combined-archive/sarif/ 2>/dev/null || true
          cp all-results/trivy-container-results/*-asff.json combined-archive/asff/ 2>/dev/null || true
          # #463 — download-artifact@v8 with `name:` (vs `pattern:`) extracts
          # flat into `path:`. The bundler-audit-json, sbom-cyclonedx, and
          # grype-sbom-results artifacts land at all-results/ root, not in a
          # per-artifact subdirectory. Use flat-prefix globs instead.
          cp all-results/bundler-audit-results.json combined-archive/ 2>/dev/null || true
          cp all-results/sbom-ruby.cdx.json combined-archive/sbom/ 2>/dev/null || true
          cp all-results/trivy-fs-results/*.cdx.json combined-archive/sbom/ 2>/dev/null || true
          cp all-results/trivy-container-results/*.cdx.json combined-archive/sbom/ 2>/dev/null || true
          # #461 — Grype SBOM-driven SCA: SARIF + raw JSON
          mkdir -p combined-archive/grype
          cp all-results/grype-*.sarif combined-archive/sarif/ 2>/dev/null || true
          cp all-results/grype-*.json combined-archive/grype/ 2>/dev/null || true
          # #472 — license inventory (consolidated JSON + MD) + canonical merged SBOM
          mkdir -p combined-archive/licenses
          cp all-results/license-inventory.json combined-archive/licenses/ 2>/dev/null || true
          cp all-results/license-inventory.md combined-archive/licenses/ 2>/dev/null || true
          cp all-results/sparc-combined-sbom.cdx.json combined-archive/sbom/ 2>/dev/null || true
          cd combined-archive && zip -r ../security-scan-results.zip .

      - name: Evaluate severity threshold
        if: env.FAIL_ON_SEVERITY != 'none'
        run: |
          echo "Checking HDF results against severity threshold: ${{ env.FAIL_ON_SEVERITY }}"
          # SAF CLI view summary provides pass/fail counts per profile
          # For now, fail if any HDF file contains critical/high findings
          FAILED=0
          for hdf_file in hdf-results/*.hdf.json; do
            [ -f "$hdf_file" ] || continue
            # Count failed controls — a non-zero count at threshold triggers failure
            FAIL_COUNT=$(jq '[.profiles[]?.controls[]? | select(.results[]?.status == "failed")] | length' "$hdf_file" 2>/dev/null || echo "0")
            if [ "$FAIL_COUNT" -gt 0 ]; then
              echo "::warning::$(basename $hdf_file) has $FAIL_COUNT failed controls"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "::error::Security findings exceed ${{ env.FAIL_ON_SEVERITY }} severity threshold"
            exit 1
          fi

      - name: Upload combined archive
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: security-scan-archive
          path: security-scan-results.zip
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════
  # Security Gate (#244)
  # ═══════════════════════════════════════════════════════════════
  # Threshold-based merge-blocking gate. Pipeline:
  #
  #   1. Apply amendments from docs/compliance/sparc-findings.yml
  #      (false_positive / waiver / poam dispositions) to each scanner
  #      HDF using mitre/hdf-libs `hdf amend`. Dispositioned findings
  #      become `notApplicable` (FP/waiver) or `failed` w/ POA&M tracking
  #      (deferred). Remediated entries are skipped (not emitted).
  #
  #   2. Run `saf validate threshold -T docs/compliance/threshold.yml`
  #      against each amended HDF. Threshold enforces strict policy on
  #      the residual: critical=0, high=5, medium=20, scanner-specific
  #      tighter bands for SAST/secrets.
  #
  #   3. Job fails if any amended HDF violates threshold OR if the
  #      converter rejects sparc-findings.yml (validation: critical
  #      can't be accepted, review windows, freshness check).
  #
  # NOTE: hdf-cli is currently bootstrapped via curl install. Per #244
  # plan, sparc-iac will bake hdf-cli into the sparc-ci-runner image;
  # once that lands, drop the install step.
  # ═══════════════════════════════════════════════════════════════

  security_gate:
    runs-on: ubuntu-latest
    needs: [ changes, normalize_hdf ]
    if: always() && (needs.changes.outputs.app_code == 'true' || github.event_name != 'pull_request')
    permissions:
      contents: read
    steps:
      - name: Checkout (for findings + threshold + converter)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            docs/compliance/sparc-findings.yml
            docs/compliance/threshold.yml
            bin/sparc_findings_to_hdf_amendments.rb
            bin/install-hdf.sh
          sparse-checkout-cone-mode: false

      - name: Set up Ruby (converter only — no bundle)
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1
        with:
          ruby-version: 3.4

      - name: Download HDF results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: hdf-results
          path: hdf-results/

      - name: Install hdf (mitre/hdf-libs CLI)
        # Single source of truth for hdf provisioning is bin/install-hdf.sh —
        # used here, by the SPARC Dockerfile (#449), and by local dev. The
        # script handles arch detection and SHA-256 verification against
        # checksums.txt from the same release.
        env:
          HDF_LIBS_VERSION: "3.2.0"
        run: bin/install-hdf.sh

      - name: Convert sparc-findings.yml to HDF Amendments
        run: |
          ruby bin/sparc_findings_to_hdf_amendments.rb \
            --input docs/compliance/sparc-findings.yml \
            --output amendments.hdf.json
          echo "## Security Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Converted findings to HDF Amendments. Override count:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          jq '.overrides | length' amendments.hdf.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Verify amendment document against v3.2.0 schema
        run: |
          hdf amend verify amendments.hdf.json
          hdf amend list amendments.hdf.json | head -20

      - name: Apply amendments to each HDF
        run: |
          set -e
          mkdir -p amended
          for hdf in hdf-results/*.hdf.json; do
            [ -f "$hdf" ] || continue
            name=$(basename "$hdf")
            echo "Amending $name..."
            hdf amend apply --results "$hdf" --amendments amendments.hdf.json -o "amended/$name" || {
              echo "::warning::hdf amend apply failed for $name; using raw HDF as fallback"
              cp "$hdf" "amended/$name"
            }
          done
          ls -la amended/

      - name: Validate threshold against amended HDFs
        uses: mitre/saf_action@a19f76ed3721c14aa8a1afb8eded117d8bf16a5d # v1
        with:
          command_string: 'validate threshold -F amended -T docs/compliance/threshold.yml'

      - name: Step summary on success
        if: success()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✓ Security gate passed — all amended HDFs satisfy threshold.yml" >> $GITHUB_STEP_SUMMARY

      - name: Upload amended HDFs (debug)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: amended-hdfs
          path: amended/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  # Cross-Repo: Publish Compliance Artifacts for sparc-iac
  # ═══════════════════════════════════════════════════════════════
  # sparc-iac's FedRAMP 20x pipeline consumes SPARC's HDF scan
  # results and OSCAL CDEFs to assemble the complete SSP package.
  #
  # How it works:
  #   1. This job bundles HDF + CDEFs + OSCAL metadata into a
  #      single "sparc-compliance-latest" artifact
  #   2. Sends a repository_dispatch to sparc-iac with the run_id
  #   3. sparc-iac downloads via GitHub REST API:
  #      GET /repos/risk-sentinel/sparc/actions/runs/{run_id}/artifacts
  #      GET /repos/risk-sentinel/sparc/actions/artifacts/{id}/zip
  #
  # Required secret: SPARC_IAC_DISPATCH_TOKEN
  #   A GitHub PAT (or fine-grained token) with:
  #   - `contents: read` on risk-sentinel/sparc (artifact download)
  #   - `contents: write` on risk-sentinel/sparc-iac (dispatch)
  # ═══════════════════════════════════════════════════════════════

  publish_for_sparc_iac:
    runs-on: ubuntu-latest
    needs: [ changes, bundle_results ]
    if: always() && github.ref == 'refs/heads/main' && (needs.changes.outputs.app_code == 'true' || github.event_name != 'pull_request')
    env:
      HAS_DISPATCH_TOKEN: ${{ secrets.SPARC_IAC_DISPATCH_TOKEN != '' }}
    steps:
      - name: Checkout code (for OSCAL CDEFs and metadata)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            .github/oscal-metadata.json
            docs/compliance/oscal/cdefs

      - name: Download HDF results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: hdf-results
          path: hdf-results/
        continue-on-error: true

      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom-cyclonedx
          path: sbom/
        continue-on-error: true

      - name: Download SARIF results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: '*-results'
          path: sarif-results/
          merge-multiple: true
        continue-on-error: true

      - name: Download license inventory
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: license-inventory
          path: licenses/
        continue-on-error: true

      - name: Bundle compliance artifacts for sparc-iac
        run: |
          mkdir -p sparc-compliance/hdf sparc-compliance/cdefs sparc-compliance/sbom sparc-compliance/sarif sparc-compliance/licenses

          # HDF scan results (normalized by SAF CLI — includes SBOM-to-HDF conversions)
          cp hdf-results/*.hdf.json sparc-compliance/hdf/ 2>/dev/null || true

          # OSCAL component definitions (application-level controls)
          cp docs/compliance/oscal/cdefs/*.json sparc-compliance/cdefs/ 2>/dev/null || true

          # SBOMs for supply chain evidence (CycloneDX format)
          cp sbom/*.json sparc-compliance/sbom/ 2>/dev/null || true

          # #472 — Consolidated license inventory (JSON + MD) + canonical merged SBOM
          cp licenses/license-inventory.json sparc-compliance/licenses/ 2>/dev/null || true
          cp licenses/license-inventory.md sparc-compliance/licenses/ 2>/dev/null || true
          cp licenses/sparc-combined-sbom.cdx.json sparc-compliance/sbom/ 2>/dev/null || true

          # Raw SARIF scan results for audit trail
          find sarif-results/ -name '*.sarif' -exec cp {} sparc-compliance/sarif/ \; 2>/dev/null || true
          find sarif-results/ -name '*.sarif.json' -exec cp {} sparc-compliance/sarif/ \; 2>/dev/null || true

          # OSCAL metadata with system-id for cross-repo correlation
          cp .github/oscal-metadata.json sparc-compliance/

          # Manifest for sparc-iac to verify completeness
          HDF_FILES=$(ls sparc-compliance/hdf/*.hdf.json 2>/dev/null | jq -R -s 'split("\n") | map(select(length > 0) | split("/") | last)')
          CDEF_FILES=$(ls sparc-compliance/cdefs/*.json 2>/dev/null | jq -R -s 'split("\n") | map(select(length > 0) | split("/") | last)')
          SBOM_FILES=$(ls sparc-compliance/sbom/*.json 2>/dev/null | jq -R -s 'split("\n") | map(select(length > 0) | split("/") | last)')
          SARIF_FILES=$(ls sparc-compliance/sarif/*.sarif* 2>/dev/null | jq -R -s 'split("\n") | map(select(length > 0) | split("/") | last)')
          LICENSE_FILES=$(ls sparc-compliance/licenses/* 2>/dev/null | jq -R -s 'split("\n") | map(select(length > 0) | split("/") | last)')
          jq -n \
            --arg sid "sparc-application" \
            --arg repo "risk-sentinel/sparc" \
            --arg run_id "${{ github.run_id }}" \
            --arg sha "${{ github.sha }}" \
            --arg ref "${{ github.ref }}" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson hdf "$HDF_FILES" \
            --argjson cdefs "$CDEF_FILES" \
            --argjson sbom "$SBOM_FILES" \
            --argjson sarif "${SARIF_FILES:-[]}" \
            --argjson licenses "${LICENSE_FILES:-[]}" \
            '{
              "system-id": $sid,
              "source-repo": $repo,
              "run-id": $run_id,
              "git-sha": $sha,
              "git-ref": $ref,
              "generated-at": $ts,
              "artifacts": { "hdf": $hdf, "cdefs": $cdefs, "sbom": $sbom, "sarif": $sarif, "licenses": $licenses }
            }' > sparc-compliance/manifest.json

          echo "## Compliance Bundle Contents" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find sparc-compliance/ -type f | sort >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload sparc-compliance-latest artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sparc-compliance-latest
          path: sparc-compliance/
          retention-days: 90

      # ── S3 Upload ─────────────────────────────────────────────────
      - name: Configure AWS credentials via OIDC
        if: env.HAS_DISPATCH_TOKEN == 'true'
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.SPARC_APP_CI_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload compliance artifacts to S3
        if: env.HAS_DISPATCH_TOKEN == 'true'
        env:
          COMPLIANCE_S3_BUCKET: ${{ secrets.COMPLIANCE_S3_BUCKET }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          SHA=${GITHUB_SHA::7}
          PREFIX="${DATE}/${SHA}/app"
          BUCKET="${COMPLIANCE_S3_BUCKET}"
          if [ -z "$BUCKET" ]; then
            echo "::warning::COMPLIANCE_S3_BUCKET not set — skipping S3 upload"
            exit 0
          fi
          aws s3 sync sparc-compliance/ "s3://${BUCKET}/${PREFIX}/" --no-progress
          echo "## S3 Upload" >> $GITHUB_STEP_SUMMARY
          echo "Uploaded to \`s3://${BUCKET}/${PREFIX}/\`" >> $GITHUB_STEP_SUMMARY
          echo "S3_PREFIX=${PREFIX}" >> $GITHUB_ENV

      - name: Notify sparc-iac via repository_dispatch
        if: env.HAS_DISPATCH_TOKEN == 'true'
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ secrets.SPARC_IAC_DISPATCH_TOKEN }}
          repository: risk-sentinel/sparc-iac
          event-type: sparc-compliance-updated
          client-payload: |
            {
              "system_id": "sparc-application",
              "source_repo": "risk-sentinel/sparc",
              "run_id": "${{ github.run_id }}",
              "git_sha": "${{ github.sha }}",
              "artifact_name": "sparc-compliance-latest",
              "s3_prefix": "${{ env.S3_PREFIX }}"
            }

  # ═══════════════════════════════════════════════════════════════
  # Pipeline Performance Metrics
  # ═══════════════════════════════════════════════════════════════
  # Tracks wall-clock durations and generates a control chart.
  # Runs after all other jobs complete. Commits metrics CSV and
  # updated chart PNG back to the repo (main branch only).
  # ═══════════════════════════════════════════════════════════════

  pipeline_metrics:
    runs-on: ubuntu-latest
    needs: [ changes, bundle_results ]
    if: always() && (needs.changes.outputs.app_code == 'true' || github.event_name != 'pull_request')
    permissions:
      contents: read
      actions: read
      id-token: write   # OIDC for AWS credentials
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Install matplotlib
        run: pip install matplotlib

      - name: Collect durations from all workflows for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p docs/ci
          DATE=$(date -u +%Y-%m-%d)
          SHA="${{ github.sha }}"
          SHORT_SHA=${SHA::7}

          # Find all completed workflow runs for this commit SHA
          RUNS=$(gh api "repos/${{ github.repository }}/actions/runs?head_sha=${SHA}&status=completed&per_page=100" \
            --jq '.workflow_runs[] | "\(.id),\(.name),\(.run_started_at),\(.updated_at)"')

          MAX_TOTAL=0
          while IFS=',' read -r run_id wf_name started updated; do
            [ -z "$run_id" ] || [ -z "$started" ] || [ -z "$updated" ] && continue

            START_EPOCH=$(date -d "$started" +%s 2>/dev/null || echo 0)
            END_EPOCH=$(date -d "$updated" +%s 2>/dev/null || echo 0)
            DURATION=$((END_EPOCH - START_EPOCH))
            [ "$DURATION" -lt 0 ] && DURATION=0
            [ "$DURATION" -gt "$MAX_TOTAL" ] && MAX_TOTAL=$DURATION

            # Normalize workflow name: lowercase, spaces to underscores
            NORM_NAME=$(echo "$wf_name" | tr '[:upper:]' '[:lower:]' | tr ' ' '_')

            # Skip if already recorded (idempotent)
            if ! grep -q "^${run_id}," docs/ci/pipeline-metrics.csv 2>/dev/null; then
              echo "${run_id},${DATE},${SHORT_SHA},${NORM_NAME},${DURATION},0,unknown" >> docs/ci/pipeline-metrics.csv
            fi
          done <<< "$RUNS"

          # Update total_duration column (6th field) for all rows with this SHA
          if [ "$MAX_TOTAL" -gt 0 ]; then
            sed -i "s/^\([^,]*,${DATE},${SHORT_SHA},[^,]*,[^,]*,\)0,/\1${MAX_TOTAL},/" docs/ci/pipeline-metrics.csv || true
          fi

          echo "Recorded SHA ${SHORT_SHA}: ${MAX_TOTAL}s total across all workflows"

      - name: Generate pipeline performance chart
        run: python scripts/ci/generate_pipeline_chart.py

      - name: Upload metrics artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pipeline-metrics
          path: |
            docs/ci/pipeline-metrics.csv
            docs/ci/pipeline-performance.png

      - name: Configure AWS Credentials
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.SPARC_APP_CI_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload performance chart to S3
        if: github.ref == 'refs/heads/main'
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          BUCKET="<security-artifacts-bucket>"
          aws s3 cp docs/ci/pipeline-performance.png \
            "s3://${BUCKET}/latest/pipeline-performance.png" \
            --region "${AWS_REGION}"
          aws s3 cp docs/ci/pipeline-metrics.csv \
            "s3://${BUCKET}/latest/pipeline-metrics.csv" \
            --region "${AWS_REGION}"

      - name: Performance Summary
        run: |
          echo "## Pipeline Performance" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "![Pipeline Performance XmR Chart](docs/ci/pipeline-performance.png)" >> "$GITHUB_STEP_SUMMARY"
