name: Security Scanning

on:
  pull_request:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  secrets_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | sed 's/.*"v\(.*\)".*/\1/')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --report-format sarif --report-path gitleaks-results.sarif --no-banner -v
        continue-on-error: true

      - name: Upload Gitleaks SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks

      - name: Upload Gitleaks SARIF as artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: gitleaks-sarif
          path: gitleaks-results.sarif
          retention-days: 90
          if-no-files-found: warn

  dependency_audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Install bundler-audit
        run: gem install bundler-audit

      - name: Update advisory database
        run: bundle-audit update

      - name: Run bundler-audit
        run: bundle-audit check --format json --output bundler-audit-results.json
        continue-on-error: true

      - name: Upload bundler-audit results as artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bundler-audit-json
          path: bundler-audit-results.json
          retention-days: 90

  trivy_fs_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy filesystem scan (SARIF)
        run: trivy fs --format sarif --output trivy-fs-results.sarif --severity CRITICAL,HIGH,MEDIUM --scanners vuln,misconfig,secret .
        continue-on-error: true

      - name: Upload Trivy FS SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs

      - name: Run Trivy filesystem scan (CycloneDX for SAF)
        run: trivy fs --format cyclonedx --output trivy-fs-sbom.cdx.json --scanners vuln .
        continue-on-error: true

      - name: Upload Trivy FS artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-fs-results
          path: |
            trivy-fs-results.sarif
            trivy-fs-sbom.cdx.json
          retention-days: 90
          if-no-files-found: warn

  trivy_container_scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t sparc:${{ github.sha }} .

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy container scan (SARIF)
        run: trivy image --format sarif --output trivy-container-results.sarif --severity CRITICAL,HIGH --scanners vuln sparc:${{ github.sha }}
        continue-on-error: true

      - name: Upload Trivy container SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-container-results.sarif
          category: trivy-container

      - name: Run Trivy container scan (CycloneDX for SAF)
        run: trivy image --format cyclonedx --output trivy-container-sbom.cdx.json --scanners vuln sparc:${{ github.sha }}
        continue-on-error: true

      - name: Upload Trivy container artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-container-results
          path: |
            trivy-container-results.sarif
            trivy-container-sbom.cdx.json
          retention-days: 90
          if-no-files-found: warn

  sbom_generation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Install cyclonedx-ruby
        run: gem install cyclonedx-ruby

      - name: Generate CycloneDX SBOM
        run: cyclonedx-ruby -p . -o sbom-ruby.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sbom-cyclonedx
          path: sbom-ruby.cdx.json
          retention-days: 90
