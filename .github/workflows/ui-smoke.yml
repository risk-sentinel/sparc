name: UI Smoke (Layer 2)

# Real-browser post-deploy smoke (Playwright, Chromium + Firefox) for the
# UI test net (#572/#573). Mirrors api-tests.yml: manual dispatch or after a
# successful Deploy, gated/non-blocking during ramp. Catches cross-browser
# regressions like #593 (CSP form-action killing SSO buttons in Chromium only).
#
# Requires repo secret SPARC_SMOKE_SA_TOKEN (service-account bearer token) for
# the authenticated nav walk; the login-page smoke runs without it.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "SPARC base URL to smoke-test against"
        default: "https://sparc.risk-sentinel.org"
        required: true
      capture_baseline:
        description: "Capture/refresh the axe a11y baseline (uploads a11y_baseline.json artifact) instead of enforcing"
        type: boolean
        default: false
  workflow_run:
    workflows: ["Deploy"]
    types: [completed]

env:
  SPARC_SMOKE_BASE_URL: ${{ github.event.inputs.base_url || 'https://sparc.risk-sentinel.org' }}

# Least-privilege default (#545 item 6) — this post-deploy smoke only reads the
# repo and uploads workflow artifacts; it needs no write scopes.
permissions:
  contents: read

jobs:
  ui-smoke:
    name: UI smoke (Chromium + Firefox)
    runs-on: ubuntu-latest
    # Gated, non-blocking during ramp (#572/#573). Drop continue-on-error once
    # the suite is proven stable post-deploy.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: tests/ui-smoke
          sparse-checkout-cone-mode: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Sync deps
        working-directory: tests/ui-smoke
        run: uv sync --locked

      - name: Install Playwright browsers
        working-directory: tests/ui-smoke
        run: uv run playwright install --with-deps chromium firefox

      - name: Run UI smoke (Chromium + Firefox)
        if: ${{ github.event.inputs.capture_baseline != 'true' }}
        working-directory: tests/ui-smoke
        env:
          SPARC_SMOKE_SA_TOKEN: ${{ secrets.SPARC_SMOKE_SA_TOKEN }}
        run: |
          uv run pytest --browser chromium --browser firefox \
            --junitxml=results.xml -v

      - name: Capture axe a11y baseline (Chromium + Firefox)
        if: ${{ github.event.inputs.capture_baseline == 'true' }}
        working-directory: tests/ui-smoke
        env:
          SPARC_SMOKE_SA_TOKEN: ${{ secrets.SPARC_SMOKE_SA_TOKEN }}
          UPDATE_A11Y_BASELINE: "1"
        run: |
          uv run pytest test_accessibility.py \
            --browser chromium --browser firefox -v

      - name: Upload results
        if: ${{ always() && github.event.inputs.capture_baseline != 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ui-smoke-results
          path: tests/ui-smoke/results.xml
          if-no-files-found: warn

      - name: Upload captured a11y baseline
        if: ${{ always() && github.event.inputs.capture_baseline == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: a11y-baseline
          path: tests/ui-smoke/a11y_baseline.json
          if-no-files-found: warn
