# Development Docker Compose — see docs/ENVIRONMENT_VARIABLES.md for all SPARC_* config options.
# Copy .env.example to .env to customize settings.
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ssp_tpr_manager_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"          # avoid conflict with local Postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"          # avoid conflict
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    user: root
    # Runtime apt deps for native gem extensions. zlib1g-dev is required to
    # compile the `zlib` gem added in #620 (CVE-2026-27820); without the header
    # this runtime `bundle install` fails. The Dockerfile build stage already
    # got zlib1g-dev in #620, but this dev-compose command does its own
    # apt-get — so it needs the header too (added with #561).
    command: bash -c "apt-get update -qq && apt-get install --no-install-recommends -y build-essential libpq-dev zlib1g-dev > /dev/null 2>&1; bundle install --quiet && rm -f tmp/pids/server.pid && bundle exec rails db:prepare && bundle exec rails db:seed && bundle exec puma -C config/puma.rb"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
      - storage_data:/rails/storage
      - ./ssl:/rails/ssl:ro          # SSL certs for dev HTTPS (mkcert)
    ports:
      - "3000:3000"
      - "3443:3443"                   # HTTPS port (used when SSL_DEV=true)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgresql://postgres:password@db:5432/ssp_tpr_manager_development
      REDIS_URL: redis://redis:6379/0
      ACTIVE_STORAGE_SERVICE: local
      DOCKERIZED: "true"
      BUNDLE_DEPLOYMENT: ""           # override Dockerfile frozen-install setting
      BUNDLE_WITHOUT: "development test"
      # SSL_DEV: "true"              # Uncomment to enable HTTPS on port 3443

  sidekiq:
    build: .
    user: root
    # zlib1g-dev: see the web service — needed to compile the `zlib` gem (#620) (#561).
    command: bash -c "apt-get update -qq && apt-get install --no-install-recommends -y build-essential libpq-dev zlib1g-dev > /dev/null 2>&1; bundle install --quiet && bundle exec sidekiq"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
      - storage_data:/rails/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    env_file: .env
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgresql://postgres:password@db:5432/ssp_tpr_manager_development
      REDIS_URL: redis://redis:6379/0
      BUNDLE_DEPLOYMENT: ""           # override Dockerfile frozen-install setting
      BUNDLE_WITHOUT: "development test"

volumes:
  postgres_data:
  bundle_cache:
  storage_data:
